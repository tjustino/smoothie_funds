# https://rubocop.readthedocs.io/en/stable/
# https://rubocop-performance.readthedocs.io/en/stable/cops_performance/
# https://docs.rubocop.org/projects/rails/en/stable/cops_rails/
require:
  - rubocop-performance
  - rubocop-rails

# Preferences
Style/StringLiterals:
  EnforcedStyle: double_quotes

Layout/AlignHash:
  EnforcedHashRocketStyle: table
  EnforcedColonStyle: table

# Specific to my eccentric comments
Layout/ExtraSpacing:
  Exclude:
    - Gemfile

# Well, it's seem it's a rails project
Layout/IndentationConsistency:
  EnforcedStyle: indented_internal_methods
AllCops:
  Exclude:
    - db/schema.rb
    - node_modules/**/*

# too much work for now
Metrics/AbcSize:
  Enabled: false
Metrics/BlockLength:
  Enabled: false
Metrics/ClassLength:
  Enabled: false
Metrics/CyclomaticComplexity:
  Enabled: false
Metrics/MethodLength:
  Enabled: false
Metrics/PerceivedComplexity:
  Enabled: false
